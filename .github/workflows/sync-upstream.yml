name: Sync TDLib Artifacts

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: TDLib ref to build
        required: false
        default: master
      force:
        description: Publish a new immutable rebuild even if this source release exists
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-tdlib-artifacts
  cancel-in-progress: false

permissions:
  contents: write

env:
  TD_REPO: https://github.com/tdlib/td.git

jobs:
  prepare:
    name: Resolve upstream TDLib
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.resolve.outputs.upstream_sha }}
      upstream_short_sha: ${{ steps.resolve.outputs.upstream_short_sha }}
      tdlib_version: ${{ steps.metadata.outputs.tdlib_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      should_build: ${{ steps.metadata.outputs.should_build }}
    steps:
      - name: Resolve upstream commit
        id: resolve
        env:
          UPSTREAM_REF: ${{ inputs.upstream_ref || 'master' }}
        run: |
          upstream_sha="$(git ls-remote "$TD_REPO" "$UPSTREAM_REF" | awk 'NR == 1 { print $1 }')"
          if [ -z "$upstream_sha" ] && [[ "$UPSTREAM_REF" =~ ^[0-9a-f]{40}$ ]]; then
            upstream_sha="$UPSTREAM_REF"
          fi
          test -n "$upstream_sha"
          upstream_short_sha="${upstream_sha:0:12}"
          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "upstream_short_sha=$upstream_short_sha" >> "$GITHUB_OUTPUT"
          echo "TDLib $UPSTREAM_REF -> $upstream_sha"

      - name: Check out TDLib metadata
        uses: actions/checkout@v5
        with:
          repository: tdlib/td
          ref: ${{ steps.resolve.outputs.upstream_sha }}
          path: upstream-td
          sparse-checkout: CMakeLists.txt
          sparse-checkout-cone-mode: false

      - name: Resolve versioned immutable release
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE_BUILD: ${{ inputs.force || false }}
          UPSTREAM_SHA: ${{ steps.resolve.outputs.upstream_sha }}
          UPSTREAM_SHORT_SHA: ${{ steps.resolve.outputs.upstream_short_sha }}
        run: |
          tdlib_version="$(sed -nE 's/^project\(TDLib VERSION ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' upstream-td/CMakeLists.txt)"
          test -n "$tdlib_version"
          base_release_tag="tdlib-$tdlib_version-$UPSTREAM_SHORT_SHA"
          release_tag="$base_release_tag"
          should_build=true
          if gh release view "$base_release_tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ "$FORCE_BUILD" = "true" ]; then
              release_tag="$base_release_tag-rebuild-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
            else
              should_build=false
            fi
          fi
          echo "tdlib_version=$tdlib_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"
          echo "TDLib version: $tdlib_version"
          echo "Upstream commit: $UPSTREAM_SHA"
          echo "Release tag: $release_tag"
          echo "Should build: $should_build"

  build-android:
    name: Android ${{ matrix.abi }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gperf clang libssl-dev zip

      - name: Install Android NDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;28.2.13676358" >/dev/null 2>&1 || \
          yes | sdkmanager "ndk;28.2.13676358" >/dev/null 2>&1 || true
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Cache Android native build
        uses: actions/cache@v4
        with:
          path: build/android-api23
          key: android-${{ matrix.abi }}-${{ needs.prepare.outputs.upstream_short_sha }}-${{ hashFiles('scripts/build-android-libs.sh', 'patches/*.patch') }}
          restore-keys: |
            android-${{ matrix.abi }}-

      - name: Build tdjson Android asset
        env:
          TD_COMMIT: ${{ needs.prepare.outputs.upstream_sha }}
          TD_ENABLE_LTO: OFF
        run: scripts/build-android-libs.sh ${{ matrix.abi }}

      - name: Upload Android asset
        uses: actions/upload-artifact@v4
        with:
          name: tdjson-android-${{ matrix.abi }}
          path: dist/tdjson-android-${{ matrix.abi }}.zip
          if-no-files-found: error

  build-ios:
    name: iOS XCFramework
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: brew install cmake ninja

      - name: Cache iOS native build
        uses: actions/cache@v4
        with:
          path: build/ios-min13.0
          key: ios-${{ needs.prepare.outputs.upstream_short_sha }}-${{ hashFiles('scripts/build-ios-xcframework.sh', 'patches/*.patch') }}
          restore-keys: |
            ios-

      - name: Build tdjson iOS asset
        env:
          TD_COMMIT: ${{ needs.prepare.outputs.upstream_sha }}
        run: scripts/build-ios-xcframework.sh

      - name: Upload iOS asset
        uses: actions/upload-artifact@v4
        with:
          name: tdjson-ios
          path: dist/tdjson-ios.xcframework.zip
          if-no-files-found: error

  publish:
    name: Publish tdjson release
    needs: [prepare, build-android, build-ios]
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download tdjson assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TDLIB_VERSION: ${{ needs.prepare.outputs.tdlib_version }}
          UPSTREAM_SHA: ${{ needs.prepare.outputs.upstream_sha }}
        run: |
          ls -lh release-assets
          gh release create "$RELEASE_TAG" release-assets/*.zip \
            --title "TDLib $TDLIB_VERSION ($UPSTREAM_SHA)" \
            --notes "Immutable tdjson artifacts built from tdlib/td@$UPSTREAM_SHA (TDLib $TDLIB_VERSION). Older releases are retained for reproducible Mithka builds." \
            --latest
